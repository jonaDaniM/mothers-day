<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feliz Día de las Madres</title>
    <meta
      name="description"
      content="Un slideshow del Día de las Madres lleno de amor, gratitud y recuerdos familiares."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <section class="stage" aria-label="Slideshow del Día de las Madres">
        <div class="photo-shell">
          <img id="slideBackdrop" class="photo-backdrop" src="IMG_9198.jpg" alt="" aria-hidden="true" />
          <img id="slidePhoto" class="photo-main" src="IMG_9198.jpg" alt="Recuerdo familiar" />
          <div class="soft-glow" aria-hidden="true"></div>
        </div>

        <article class="message-panel">
          <p class="kicker" id="kicker">Para la mejor mamá</p>
          <h1 id="slideTitle">Feliz Día de las Madres, Mamá</h1>
          <p id="slideMessage">
            Hoy es para ti: por tu amor, tu fuerza y la manera en que siempre
            haces que la casa se sienta llena de cariño.
          </p>

          <div class="controls" aria-label="Controles del slideshow">
            <button class="icon-button" id="prevButton" type="button" aria-label="Slide anterior">
              <span aria-hidden="true">←</span>
            </button>
            <button class="next-button" id="nextButton" type="button">
              <span>Siguiente recuerdo</span>
              <span aria-hidden="true">→</span>
            </button>
          </div>
        </article>
      </section>

      <section class="slide-footer" aria-label="Progreso del slideshow">
        <p id="counter">1 / 8</p>
        <div class="dots" id="dots"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
